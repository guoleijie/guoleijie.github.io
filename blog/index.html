<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日行业日报 | 梦醒</title>
    <meta name="description" content="AI 自动采集全球再保险行业资讯，每日更新。涵盖行业动态、科技前沿、政策法规。">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-main: #faf8f4;
            --bg-card: #ffffff;
            --bg-section: #f5f3ee;
            --accent-red: #c0392b;
            --accent-blue: #2874a6;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-light: #999999;
            --border: #e8e4de;
            --shadow: 0 2px 12px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.1);
            --radius: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }

        /* ========== NAV ========== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid transparent;
            transition: var(--transition);
        }
        .nav.scrolled {
            border-bottom-color: var(--border);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .nav-inner {
            max-width: 1120px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 8px;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
        }
        .nav-logo img {
            width: 28px; height: 28px; border-radius: 50%;
        }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a {
            font-size: 0.95rem; color: var(--text-secondary);
            transition: color var(--transition);
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0;
            height: 2px; background: var(--accent-red);
            transition: width var(--transition);
        }
        .nav-links a:hover { color: var(--accent-red); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: var(--accent-red); font-weight: 500; }
        .nav-links a.active::after { width: 100%; }

        .hamburger {
            display: none; background: none; border: none; cursor: pointer;
            color: var(--text-primary); padding: 4px;
        }

        /* ========== CELEBRATION BANNER ========== */
        .celebration-banner {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #f39c12 100%);
            color: white; text-align: center;
            padding: 16px 20px;
            font-family: 'ZCOOL KuaiLe', sans-serif;
        }
        .celebration-banner .banner-title {
            font-size: 1.1rem;
        }
        .celebration-banner .banner-sub {
            font-size: 0.85rem; opacity: 0.9; margin-top: 4px;
        }

        /* ========== PAGE HEADER ========== */
        .page-header {
            text-align: center;
            padding: 80px 24px 40px;
            max-width: 720px;
            margin: 0 auto;
        }
        .page-header h1 {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 2.2rem;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .page-header .subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* ========== REPORT LIST ========== */
        .report-list-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        .month-group {
            margin-bottom: 36px;
        }
        .month-group h3 {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .report-card {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border-radius: 12px;
            border-left: 3px solid var(--accent-red);
            box-shadow: var(--shadow);
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: transform var(--transition), box-shadow var(--transition);
            text-decoration: none;
            color: inherit;
            gap: 16px;
        }
        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .report-date {
            display: flex; flex-direction: column; align-items: center;
            min-width: 52px; text-align: center;
        }
        .report-date .day {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-red);
            line-height: 1.2;
        }
        .report-date .month {
            font-size: 0.78rem;
            color: var(--text-light);
        }

        .report-info {
            flex: 1;
            min-width: 0;
        }
        .report-info h4 {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.5;
        }
        .report-info p {
            font-size: 0.82rem;
            color: var(--text-light);
        }

        .report-arrow {
            color: var(--text-light);
            flex-shrink: 0;
            transition: transform var(--transition), color var(--transition);
        }
        .report-card:hover .report-arrow {
            transform: translateX(3px);
            color: var(--accent-red);
        }

        /* ========== LOADING ========== */
        .loading-placeholder {
            text-align: center; padding: 40px 0; color: var(--text-light);
        }
        .skeleton-card {
            background: var(--bg-card); border-radius: 12px; border-left: 3px solid var(--border);
            padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px;
        }
        .skeleton-card .skeleton-date {
            min-width: 52px; height: 40px; background: var(--bg-section); border-radius: 8px;
        }
        .skeleton-card .skeleton-text {
            flex: 1; height: 16px; background: var(--bg-section); border-radius: 4px;
        }
        .skeleton-card .skeleton-arrow {
            width: 18px; height: 18px; background: var(--bg-section); border-radius: 50%;
        }

        /* ========== FOOTER ========== */
        .site-footer {
            background: var(--bg-section);
            padding: 24px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }
        .site-footer p { margin-bottom: 8px; }
        .site-footer a {
            color: var(--text-light);
            text-decoration: none;
            transition: color var(--transition);
        }
        .site-footer a:hover { color: var(--accent-red); }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%; left: 0; right: 0;
                background: rgba(255,255,255,0.97);
                backdrop-filter: blur(16px);
                flex-direction: column;
                gap: 0;
                border-bottom: 1px solid var(--border);
                box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            }
            .nav-links.open { display: flex; }
            .nav-links li {
                border-bottom: 1px solid var(--border);
            }
            .nav-links li:last-child { border-bottom: none; }
            .nav-links a {
                display: block;
                padding: 14px 24px;
                font-size: 1rem;
            }
            .nav-links a::after { display: none; }
            .hamburger { display: block; }

            .page-header { padding-top: 70px; }
            .page-header h1 { font-size: 1.7rem; }

            .report-card {
                padding: 14px 16px;
                gap: 12px;
            }
            .report-info h4 { font-size: 0.88rem; }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="nav" id="mainNav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <img src="/assets/images/doudou-logo.webp" alt="豆豆">
                <span>梦醒</span>
            </a>
            <button class="hamburger" id="menuToggle" aria-label="菜单">
                <i data-lucide="menu" style="width:24px;height:24px;"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">首页</a></li>
                <li><a href="/blog/index.html" class="active">日报</a></li>
                <li><a href="/#skills">技能</a></li>
                <li><a href="/#experience">经历</a></li>
                <li><a href="/#about">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 庆祝横幅 -->
    <div class="celebration-banner" style="margin-top: 56px;">
        <div class="banner-title">🎉 网站全新改版上线！</div>
        <div class="banner-sub">由 AI 助手豆豆全程设计、开发、部署 — 从配色到内容，AI 驱动的个人知识平台</div>
    </div>

    <!-- 页面标题 -->
    <header class="page-header">
        <h1>📰 每日行业日报</h1>
        <p class="subtitle">AI 自动采集 · 全球再保险资讯 · 每日更新</p>
    </header>

    <!-- 日报列表（动态渲染） -->
    <div class="report-list-container" id="reportList">
        <div class="loading-placeholder" id="loadingPlaceholder">
            <div class="skeleton-card"><div class="skeleton-date"></div><div class="skeleton-text"></div><div class="skeleton-arrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-date"></div><div class="skeleton-text"></div><div class="skeleton-arrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-date"></div><div class="skeleton-text"></div><div class="skeleton-arrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-date"></div><div class="skeleton-text"></div><div class="skeleton-arrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-date"></div><div class="skeleton-text"></div><div class="skeleton-arrow"></div></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <p>© 2026 梦醒 · AI 驱动的再保险行业知识平台</p>
        <div style="margin-top: 8px;">
            <a href="https://github.com/guoleijie">GitHub</a>
            <span style="margin: 0 8px;">·</span>
            <a href="mailto:roger_g@126.com">roger_g@126.com</a>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Nav scroll effect
        window.addEventListener('scroll', () => {
            document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 10);
        });

        // Mobile menu toggle
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });

        // Close mobile menu on link click
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('open');
            });
        });

        // ===== 动态加载日报列表 =====
        (async function() {
            const container = document.getElementById('reportList');
            const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

            function fmtDate(d) {
                const dt = new Date(d + 'T00:00:00+08:00');
                return `${dt.getFullYear()}年${String(dt.getMonth()+1).padStart(2,'0')}月${String(dt.getDate()).padStart(2,'0')}日（${WEEKDAYS[dt.getDay()]}）`;
            }

            function cardHTML(date, issue, data) {
                const industryCount = (data.industry_news_cn || []).length;
                const techCount = (data.tech_news_cn || []).length;
                const total = industryCount + techCount;
                const items = [].concat(data.industry_news_cn || [], data.tech_news_cn || []).slice(0, 3);
                const preview = items.map(i => i.display_title || i.title || '').join(' / ');
                const dt = new Date(date + 'T00:00:00+08:00');
                const day = dt.getDate();
                const month = String(dt.getMonth() + 1).padStart(2, '0') + '月';
                return `<a href="/blog/daily-report.html?date=${date}" class="report-card">
                    <div class="report-date">
                        <span class="day">${day}</span>
                        <span class="month">${month}</span>
                    </div>
                    <div class="report-info">
                        <h4>再保险行业日报 第${issue}期 | ${fmtDate(date)}</h4>
                        <p>${total > 0 ? `共 ${total} 条新闻：${industryCount} 条行业新闻，${techCount} 条科技前沿` : preview}</p>
                    </div>
                    <i data-lucide="arrow-right" class="report-arrow" style="width:18px;height:18px;"></i>
                </a>`;
            }

            try {
                const m = await (await fetch('/data/manifest.json')).json();
                const sorted = [...m.available_dates].sort().reverse();
                const total = sorted.length;

                // First pass: render all cards with skeleton info (no data fetch yet)
                const groups = {};
                sorted.forEach(date => {
                    const dt = new Date(date + 'T00:00:00+08:00');
                    const key = `${dt.getFullYear()}年${String(dt.getMonth()+1).padStart(2,'0')}月`;
                    if (!groups[key]) groups[key] = [];
                    const issue = total - sorted.indexOf(date);
                    groups[key].push({ date, issue });
                });

                // Render skeleton cards with basic info
                let html = '<section>';
                for (const [month, entries] of Object.entries(groups)) {
                    html += `<div class="month-group"><h3>📅 ${month}</h3>`;
                    entries.forEach(e => {
                        const dt = new Date(e.date + 'T00:00:00+08:00');
                        html += `<a href="/blog/daily-report.html?date=${e.date}" class="report-card" data-date="${e.date}">
                            <div class="report-date">
                                <span class="day">${dt.getDate()}</span>
                                <span class="month">${String(dt.getMonth()+1).padStart(2,'0')}月</span>
                            </div>
                            <div class="report-info">
                                <h4>再保险行业日报 第${e.issue}期 | ${fmtDate(e.date)}</h4>
                                <p class="card-loading" style="color:var(--text-light);">加载中...</p>
                            </div>
                            <i data-lucide="arrow-right" class="report-arrow" style="width:18px;height:18px;"></i>
                        </a>`;
                    });
                    html += '</div>';
                }
                html += '</section>';
                container.innerHTML = html;
                lucide.createIcons();

                // Second pass: batch fetch data and update summaries
                const BATCH_SIZE = 5;
                for (let i = 0; i < sorted.length; i += BATCH_SIZE) {
                    const batch = sorted.slice(i, i + BATCH_SIZE);
                    const results = await Promise.allSettled(
                        batch.map(d => fetch(`/data/daily_report_${d}_cn.json`).then(r => r.json()))
                    );
                    batch.forEach((date, j) => {
                        const card = container.querySelector(`[data-date="${date}"]`);
                        if (!card) return;
                        const loadingEl = card.querySelector('.card-loading');
                        if (!loadingEl) return;
                        if (results[j].status === 'fulfilled') {
                            const data = results[j].value;
                            const ic = (data.industry_news_cn || []).length;
                            const tc = (data.tech_news_cn || []).length;
                            const total = ic + tc;
                            loadingEl.textContent = total > 0
                                ? `共 ${total} 条新闻：${ic} 条行业新闻，${tc} 条科技前沿`
                                : '';
                            loadingEl.style.color = '';
                        } else {
                            loadingEl.textContent = '摘要加载失败';
                            loadingEl.style.color = 'var(--accent-red)';
                        }
                    });
                }
            } catch(e) {
                container.innerHTML = '<div class="loading-placeholder"><p>日报加载失败，请刷新重试</p></div>';
            }
        })();
    </script>
</body>
</html>
